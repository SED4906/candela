<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer><family>Caladea</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Inter Variable</family></prefer>
  </alias>
  <match target="font">
    <test name="family" compare="eq" ignore-blanks="true">
        <string>Inter Variable</string>
    </test>
    <edit name="fontfeatures" mode="append">
        <string>zero on</string>
        <string>cv02 on</string>
        <string>cv04 on</string>
        <string>cv05 on</string>
        <string>cv06 on</string>
        <string>cv08 on</string>
    </edit>
  </match>
  <alias>
    <family>monospace</family>
    <prefer><family>Iosevka</family></prefer>
  </alias>
</fontconfig>
